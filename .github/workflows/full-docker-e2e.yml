name: Full Docker E2E

on: workflow_dispatch

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SKIP_DOCKER_MOUNT_TESTS: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Docker info
        run: docker info

      - name: Pytest (full Docker E2E)
        run: pytest tests/integration tests/e2e -q -v
